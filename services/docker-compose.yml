version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: covenant
      POSTGRES_PASSWORD: covenant
      POSTGRES_DB: covenant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covenant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  covenant-api:
    build:
      context: ./covenant-api
      target: production
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://covenant:covenant@postgres:5432/covenant
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: "*"
      RATE_LIMIT_MAX: "100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  websocket-server:
    build:
      context: ./websocket-server
      target: production
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: "*"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent-api:
    build:
      context: ./agent-api
      target: production
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://covenant:covenant@postgres:5432/covenant_agents
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: '["*"]'
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # TheGraph node for local testing
  graph-node:
    image: graphprotocol/graph-node:latest
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8020:8020"
      - "8030:8030"
      - "8040:8040"
    environment:
      postgres_host: postgres
      postgres_user: covenant
      postgres_pass: covenant
      postgres_db: covenant_graph
      ipfs: "https://ipfs.io"
      ethereum: "mainnet:https://eth-mainnet.g.alchemy.com/v2/demo"
      GRAPH_LOG: info
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
