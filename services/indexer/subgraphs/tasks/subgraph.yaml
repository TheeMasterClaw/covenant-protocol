specVersion: 0.0.4
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: TaskMarket
    network: xlayer
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: TaskMarket
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - TaskMarket
        - Task
        - TaskEvent
      abis:
        - name: TaskMarket
          file: ./abis/TaskMarket.json
        - name: TaskEscrow
          file: ./abis/TaskEscrow.json
        - name: TaskAuction
          file: ./abis/TaskAuction.json
      eventHandlers:
        - event: TaskCreated(indexed uint256,indexed address,indexed address,string,uint256,uint256)
          handler: handleTaskCreated
        - event: TaskAssigned(indexed uint256,indexed address,indexed address,uint256)
          handler: handleTaskAssigned
        - event: TaskSubmitted(indexed uint256,indexed address,string,uint256)
          handler: handleTaskSubmitted
        - event: TaskCompleted(indexed uint256,indexed address,uint256)
          handler: handleTaskCompleted
        - event: TaskCancelled(indexed uint256,indexed address,string,uint256)
          handler: handleTaskCancelled
        - event: TaskDisputed(indexed uint256,indexed uint256,indexed address,uint256)
          handler: handleTaskDisputed
        - event: BidPlaced(indexed uint256,indexed address,uint256,string)
          handler: handleBidPlaced
        - event: BidAccepted(indexed uint256,indexed address,uint256)
          handler: handleBidAccepted
        - event: PlatformFeeUpdated(indexed uint256)
          handler: handlePlatformFeeUpdated
      file: ./src/mapping.ts
  - kind: ethereum
    name: TaskEscrow
    network: xlayer
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: TaskEscrow
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - TaskEscrow
        - Task
      abis:
        - name: TaskEscrow
          file: ./abis/TaskEscrow.json
      eventHandlers:
        - event: EscrowCreated(indexed uint256,indexed address,uint256)
          handler: handleEscrowCreated
        - event: EscrowReleased(indexed uint256,indexed address,uint256)
          handler: handleEscrowReleased
        - event: EscrowRefunded(indexed uint256,indexed address,uint256)
          handler: handleEscrowRefunded
      file: ./src/escrowMapping.ts
  - kind: ethereum
    name: TaskReview
    network: xlayer
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: TaskReview
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - TaskReview
        - Task
      abis:
        - name: TaskReview
          file: ./abis/TaskReview.json
      eventHandlers:
        - event: ReviewSubmitted(indexed uint256,indexed address,indexed address,uint256,string)
          handler: handleReviewSubmitted
      file: ./src/reviewMapping.ts
