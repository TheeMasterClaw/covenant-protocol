specVersion: 0.0.4
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: CovenantFactory
    network: xlayer
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: CovenantFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - CovenantFactory
        - Covenant
        - CovenantEvent
        - User
      abis:
        - name: CovenantFactory
          file: ./abis/CovenantFactory.json
        - name: CovenantImplementation
          file: ./abis/CovenantImplementation.json
      eventHandlers:
        - event: CovenantCreated(indexed address,indexed address,indexed uint256,string)
          handler: handleCovenantCreated
        - event: ImplementationUpgraded(indexed address,indexed uint256)
          handler: handleImplementationUpgraded
        - event: Paused(address)
          handler: handlePaused
        - event: Unpaused(address)
          handler: handleUnpaused
      file: ./src/mapping.ts
  - kind: ethereum
    name: CovenantRegistry
    network: xlayer
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: CovenantRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - Covenant
        - User
        - CovenantParticipant
      abis:
        - name: CovenantRegistry
          file: ./abis/CovenantRegistry.json
      eventHandlers:
        - event: CovenantRegistered(indexed address,indexed uint256,indexed address)
          handler: handleCovenantRegistered
        - event: CovenantUpdated(indexed address,indexed uint256)
          handler: handleCovenantUpdated
        - event: ParticipantJoined(indexed address,indexed address,uint8,uint256)
          handler: handleParticipantJoined
        - event: ParticipantLeft(indexed address,indexed address)
          handler: handleParticipantLeft
      file: ./src/registryMapping.ts
templates:
  - kind: ethereum
    name: CovenantImplementation
    network: xlayer
    source:
      abi: CovenantImplementation
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - Covenant
        - CovenantEvent
        - Task
      abis:
        - name: CovenantImplementation
          file: ./abis/CovenantImplementation.json
      eventHandlers:
        - event: CovenantActivated(indexed uint256)
          handler: handleCovenantActivated
        - event: CovenantPaused(indexed uint256)
          handler: handleCovenantPaused
        - event: CovenantDissolved(indexed uint256,indexed address,string)
          handler: handleCovenantDissolved
        - event: TermsUpdated(indexed uint256,indexed bytes32,string)
          handler: handleTermsUpdated
        - event: FundsDeposited(indexed uint256,indexed address,uint256)
          handler: handleFundsDeposited
        - event: FundsWithdrawn(indexed uint256,indexed address,uint256)
          handler: handleFundsWithdrawn
        - event: TaskCreated(indexed uint256,indexed uint256,indexed address,string,uint256)
          handler: handleTaskCreated
      file: ./src/covenantMapping.ts
