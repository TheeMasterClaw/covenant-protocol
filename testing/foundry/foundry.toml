[profile.default]
src = "test"
out = "artifacts"
libs = ["../../node_modules", "lib"]
remappings = [
    "@openzeppelin/=../../node_modules/@openzeppelin/",
    "eth-gas-reporter/=../../node_modules/eth-gas-reporter/",
    "hardhat/=../../node_modules/hardhat/",
    "forge-std/=lib/forge-std/src/",
]
solc_version = "0.8.24"
auto_detect_solc = true
optimizer = true
optimizer_runs = 200

[fmt]
line_length = 120
