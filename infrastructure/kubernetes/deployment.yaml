apiVersion: apps/v1
kind: Deployment
metadata:
  name: covenant-api
  namespace: covenant-protocol
spec:
  replicas: 3
  selector:
    matchLabels:
      app: covenant-api
  template:
    metadata:
      labels:
        app: covenant-api
    spec:
      containers:
      - name: api
        image: covenantprotocol/api:latest
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
